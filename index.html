<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiMone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f7f7f5;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 480px;
    width: 100%;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .logo {
    width: 220px;
    margin: 0 auto 2rem;
    display: block;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 2rem;
    border: 1px solid #eee;
  }
  h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: #1a1a2e;
  }
  p {
    font-size: 0.9rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  .aceite {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    text-align: left;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: #f7f7f5;
    border-radius: 10px;
  }
  .aceite input { margin-top: 3px; accent-color: #f5a623; }
  .aceite label { font-size: 0.82rem; color: #555; line-height: 1.5; }
  .btn {
    display: block;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.85rem 2rem;
    font-size: 0.95rem;
    cursor: pointer;
    width: 100%;
    opacity: 0.4;
    transition: opacity 0.2s, background 0.2s;
  }
  .btn.ativo { opacity: 1; }
  .btn.ativo:hover { background: #f5a623; color: #1a1a2e; }
  .rodape {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="container">
  <img src="simonelogo.jpg" alt="SiMone" class="logo">
  <div class="card">
    <h2>Bem-vindo</h2>
    <p>Este é um espaço de leitura do seu estado funcional. Não há respostas certas ou erradas — apenas o que você está sentindo agora.</p>
    <div class="aceite">
      <input type="checkbox" id="aceito" onchange="toggleBtn()">
      <label for="aceito">Concordo que meus dados sejam usados de forma anônima nesta fase de desenvolvimento do SiMone.</label>
    </div>
    <button class="btn" id="btnComecar" disabled onclick="comecar()">Começar</button>
  </div>
  <div class="rodape">SiMone V24 · fase de desenvolvimento</div>
</div>
<script>
  function toggleBtn() {
    const cb = document.getElementById('aceito');
    const btn = document.getElementById('btnComecar');
    btn.disabled = !cb.checked;
    btn.classList.toggle('ativo', cb.checked);
  }
  function comecar() {
    alert('Questionário em construção.');
  }
</script>
</body>
</html>
