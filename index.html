<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiMone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f7f7f5;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 480px;
    width: 100%;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .logo-text {
    font-size: 2.5rem;
    font-weight: 700;
    color: #1a1a2e;
  }
  .logo-text span { color: #f5a623; }
  .tagline {
    font-size: 0.95rem;
    color: #888;
    margin-top: 0.25rem;
    margin-bottom: 2.5rem;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 2rem;
    border: 1px solid #eee;
  }
  h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.9rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  .btn {
    display: inline-block;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.85rem 2rem;
    font-size: 0.95rem;
    cursor: pointer;
    width: 100%;
  }
  .btn:hover { background: #f5a623; color: #1a1a2e; }
  .rodape {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo-text">Si<span>M</span>one</div>
  <div class="tagline">Sentir, Organizar e Agir</div>
  <div class="card">
    <h2>Bem-vindo</h2>
    <p>Este é um espaço de leitura do seu estado funcional. Não há respostas certas ou erradas — apenas o que você está sentindo agora.</p>
    <button class="btn">Começar</button>
  </div>
  <div class="rodape">SiMone V24 · fase de desenvolvimento</div>
</div>
</body>
</html>
