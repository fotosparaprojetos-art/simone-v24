<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiMone · Painel Profissional</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
.topo { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.topo-esq { display: flex; align-items: center; gap: 1rem; }
.topo img { width: 90px; }
.topo h1 { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.05em; opacity: 0.9; }
.btn-sair { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; cursor: pointer; }
.btn-sair:hover { background: rgba(255,255,255,0.1); }
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem; }

/* ── Tela de validação ── */
.tela-validacao { max-width: 420px; margin: 4rem auto; background: white; border-radius: 16px; border: 1px solid #eee; padding: 2rem 1.75rem; }
.tela-validacao h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
.tela-validacao p { font-size: 0.82rem; color: #888; margin-bottom: 1.5rem; }
.campo { margin-bottom: 1rem; }
.campo label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #999; margin-bottom: 4px; }
.campo input, .campo select { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 0.55rem 0.8rem; font-size: 0.88rem; font-family: inherit; color: #1a1a2e; }
.campo input:focus { outline: none; border-color: #1a1a2e; }
.btn-validar { width: 100%; background: #1a1a2e; color: white; border: none; border-radius: 10px; padding: 0.7rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
.btn-validar:hover { background: #f5a623; color: #1a1a2e; }
.erro-validacao { font-size: 0.82rem; color: #c0392b; margin-top: 0.75rem; min-height: 1.2rem; }

/* ── Painel ── */
.painel-container { display: none; }
.painel-container.visivel { display: block; }
.info-sessao { background: white; border-radius: 12px; border: 1px solid #eee; padding: 0.85rem 1.25rem; margin-bottom: 1.5rem; display: flex; gap: 2rem; flex-wrap: wrap; }
.info-sessao span { font-size: 0.78rem; color: #888; }
.info-sessao b { color: #1a1a2e; }

/* ── Resultado do questionado ── */
.resultado-card { background: white; border-radius: 12px; border: 1px solid #eee; padding: 1.25rem; margin-bottom: 1rem; }
.resultado-card h3 { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 0.75rem; }
.p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
.p-bloco { background: #f7f7f5; border-radius: 10px; padding: 0.85rem 1rem; }
.p-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 5px; }
.p-valor { font-size: 0.88rem; color: #1a1a2e; line-height: 1.5; }
.p-sub { font-size: 0.8rem; color: #666; margin-top: 3px; line-height: 1.5; }
.badge { display:inline-block;font-size:0.58rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:2px 7px;border-radius:99px;margin-left:6px; }
.badge-elevado{background:#fde8e8;color:#c0392b;}
.badge-moderado{background:#fef3e2;color:#e67e22;}
.badge-leve{background:#eafaf1;color:#27ae60;}
.heatmap-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 6px; }
.hm-nome { font-size: 0.75rem; color: #666; width: 90px; flex-shrink: 0; }
.hm-wrap { flex: 1; height: 8px; background: #eee; border-radius: 99px; }
.hm-barra { height: 8px; border-radius: 99px; background: #f5a623; }
.hm-dominante { background: #e74c3c; }
.hm-pct { font-size: 0.68rem; color: #aaa; width: 30px; text-align: right; }
.empty { text-align: center; color: #bbb; padding: 3rem; font-size: 0.88rem; }
.loading { text-align: center; color: #aaa; padding: 2rem; font-size: 0.85rem; }
.longitudinal-label { font-size: 0.78rem; color: #888; line-height: 1.7; }
</style>
</head>
<body>

<div class="topo">
  <div class="topo-esq">
    <img src="logo.png" alt="SiMone">
    <h1>Painel Profissional</h1>
  </div>
  <button class="btn-sair" id="btn-sair" style="display:none" onclick="sair()">Sair</button>
</div>

<!-- Tela de validação -->
<div id="tela-validacao" class="container">
  <div class="tela-validacao">
    <h2>Acesso profissional</h2>
    <p>Preencha os dados de acesso para visualizar o questionado autorizado.</p>

    <div class="campo">
      <label>CRM</label>
      <input type="text" id="v-crm" placeholder="Ex: 123456" autocomplete="off">
    </div>
    <div class="campo">
      <label>UF do CRM</label>
      <input type="text" id="v-uf" placeholder="Ex: SP" maxlength="2" autocomplete="off">
    </div>
    <div class="campo">
      <label>Código profissional</label>
      <input type="text" id="v-codigo-prof" placeholder="Ex: AB3K7MN" autocomplete="off">
    </div>
    <div class="campo">
      <label>Código do questionado</label>
      <input type="text" id="v-codigo-q" placeholder="Ex: XY4R2WP" autocomplete="off">
    </div>
    <div class="campo">
      <label>Token de autorização</label>
      <input type="text" id="v-token" placeholder="Token fornecido pelo questionado" autocomplete="off">
    </div>

    <button class="btn-validar" onclick="validarAcesso()">Validar acesso</button>
    <div class="erro-validacao" id="erro-validacao"></div>
  </div>
</div>

<!-- Painel profissional -->
<div id="painel-container" class="painel-container">
  <div class="container">
    <div class="info-sessao" id="info-sessao"></div>
    <div id="conteudo-painel"><div class="loading">Carregando dados...</div></div>
  </div>
</div>

<script>
// ─── SESSÃO ───────────────────────────────────────────────────────────────────

function obterSessao() {
  return {
    session_token:   sessionStorage.getItem('simone_session_token'),
    questionado_id:  sessionStorage.getItem('simone_questionado_id'),
    profissional_id: sessionStorage.getItem('simone_profissional_id')
  };
}

function salvarSessao(dados) {
  sessionStorage.setItem('simone_session_token',   dados.session_token);
  sessionStorage.setItem('simone_questionado_id',  dados.questionado_id);
  sessionStorage.setItem('simone_profissional_id', dados.profissional_id);
}

function limparSessao() {
  sessionStorage.removeItem('simone_session_token');
  sessionStorage.removeItem('simone_questionado_id');
  sessionStorage.removeItem('simone_profissional_id');
}

function sair() {
  limparSessao();
  mostrarValidacao();
}

// ─── EXIBIÇÃO ─────────────────────────────────────────────────────────────────

function mostrarValidacao() {
  document.getElementById('tela-validacao').style.display = '';
  document.getElementById('painel-container').classList.remove('visivel');
  document.getElementById('btn-sair').style.display = 'none';
  document.getElementById('erro-validacao').textContent = '';
}

function mostrarPainel(sessao) {
  document.getElementById('tela-validacao').style.display = 'none';
  document.getElementById('painel-container').classList.add('visivel');
  document.getElementById('btn-sair').style.display = '';

  document.getElementById('info-sessao').innerHTML =
    '<span>Questionado: <b>' + sessao.questionado_id + '</b></span>' +
    '<span>Sessão ativa</span>';

  carregarDados(sessao);
}

// ─── VALIDAÇÃO ────────────────────────────────────────────────────────────────

async function validarAcesso() {
  var crm             = document.getElementById('v-crm').value.trim();
  var uf_crm          = document.getElementById('v-uf').value.trim().toUpperCase();
  var codigo_prof     = document.getElementById('v-codigo-prof').value.trim();
  var codigo_q        = document.getElementById('v-codigo-q').value.trim();
  var token           = document.getElementById('v-token').value.trim();
  var erroEl          = document.getElementById('erro-validacao');

  erroEl.textContent = '';

  if (!crm || !uf_crm || !codigo_prof || !codigo_q || !token) {
    erroEl.textContent = 'Preencha todos os campos.';
    return;
  }

  var btn = document.querySelector('.btn-validar');
  btn.textContent = 'Validando...';
  btn.disabled = true;

  try {
    var res = await fetch('/profissional/validar-acesso', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        crm:                crm,
        uf_crm:             uf_crm,
        codigo_profissional: codigo_prof,
        codigo_questionado:  codigo_q,
        token_autorizacao:   token
      })
    });

    var dados = await res.json();

    if (!res.ok || !dados.autorizado) {
      erroEl.textContent = dados.erro || 'Acesso não autorizado.';
      return;
    }

    salvarSessao(dados);
    mostrarPainel(dados);

  } catch (e) {
    erroEl.textContent = 'Erro ao conectar. Tente novamente.';
  } finally {
    btn.textContent = 'Validar acesso';
    btn.disabled = false;
  }
}

// ─── CARREGAR DADOS DO QUESTIONADO ───────────────────────────────────────────

async function carregarDados(sessao) {
  var el = document.getElementById('conteudo-painel');
  el.innerHTML = '<div class="loading">Carregando...</div>';

  try {
    var res = await fetch('/profissional/questionado/' + sessao.questionado_id, {
      headers: {
        'x-session-token': sessao.session_token
      }
    });

    if (res.status === 401) {
      limparSessao();
      mostrarValidacao();
      return;
    }

    var dados = await res.json();

    if (!res.ok || dados.erro) {
      el.innerHTML = '<div class="empty">' + (dados.erro || 'Erro ao carregar dados.') + '</div>';
      return;
    }

    renderPainel(dados, el);

  } catch (e) {
    el.innerHTML = '<div class="empty">Erro ao carregar. Tente novamente.</div>';
  }
}

// ─── RENDERIZAR PAINEL ────────────────────────────────────────────────────────

function renderPainel(dados, el) {
  if (!dados || !dados.resultados || dados.resultados.length === 0) {
    el.innerHTML = '<div class="empty">Nenhum resultado disponível para este questionado.</div>';
    return;
  }

  var html = '';
  var ultimo = dados.resultados[0];
  var eixos  = ultimo.eixos || {};

  // card: último resultado
  html += '<div class="resultado-card">';
  html += '<h3>Último resultado — ' + fmtData(ultimo.criado_em || ultimo.created_at) + '</h3>';
  html += '<div class="p-grid">';

  ['S','O','A','P'].forEach(function(k) {
    if (eixos[k] != null) {
      html += '<div class="p-bloco">';
      html += '<div class="p-label">' + nomeEixo(k) + '</div>';
      html += '<div class="p-valor">' + Number(eixos[k]).toFixed(1) + '</div>';
      html += '</div>';
    }
  });

  html += '</div>';

  if (eixos.G != null) {
    html += '<div class="p-bloco">';
    html += '<div class="p-label">G — Carga global</div>';
    html += '<div class="p-valor">' + Number(eixos.G).toFixed(1);
    if (ultimo.gravidade) html += '<span class="badge badge-' + ultimo.gravidade + '">' + ultimo.gravidade + '</span>';
    html += '</div></div>';
  }

  // heatmap de eixos
  html += '<div class="p-bloco"><div class="p-label">Intensidade por eixo</div>';
  ['S','O','A','P'].forEach(function(k) {
    if (eixos[k] != null) {
      var pct = Math.round((eixos[k] / 4) * 100);
      html += '<div class="heatmap-row">';
      html += '<div class="hm-nome">' + nomeEixo(k) + '</div>';
      html += '<div class="hm-wrap"><div class="hm-barra" style="width:' + pct + '%"></div></div>';
      html += '<div class="hm-pct">' + pct + '%</div>';
      html += '</div>';
    }
  });
  html += '</div>';

  // assinatura
  if (ultimo.assinatura) {
    html += '<div class="p-bloco"><div class="p-label">Assinatura</div>';
    html += '<div class="p-valor">' + ultimo.assinatura + '</div></div>';
  }

  // flags de coerência
  if (ultimo.flags && Array.isArray(ultimo.flags) && ultimo.flags.length > 0) {
    html += '<div class="p-bloco"><div class="p-label">Flags de coerência</div>';
    html += '<div class="p-sub">' + ultimo.flags.join(', ') + '</div></div>';
  }

  html += '</div>'; // fecha resultado-card

  // histórico de sessões
  if (dados.resultados.length > 1) {
    html += '<div class="resultado-card">';
    html += '<h3>Histórico (' + dados.resultados.length + ' medições)</h3>';
    html += '<table style="width:100%;border-collapse:collapse;font-size:0.78rem;">';
    html += '<thead><tr style="background:#1a1a2e;color:white;">';
    html += '<th style="padding:6px 10px;text-align:left;">Data</th>';
    html += '<th style="padding:6px 10px;">S</th><th style="padding:6px 10px;">O</th>';
    html += '<th style="padding:6px 10px;">A</th><th style="padding:6px 10px;">P</th>';
    html += '<th style="padding:6px 10px;">G</th><th style="padding:6px 10px;text-align:left;">Gravidade</th>';
    html += '</tr></thead><tbody>';

    dados.resultados.forEach(function(r) {
      var ex = r.eixos || {};
      html += '<tr style="border-bottom:1px solid #f0f0f0;">';
      html += '<td style="padding:6px 10px;color:#666;">' + fmtDataCurta(r.criado_em || r.created_at) + '</td>';
      ['S','O','A','P','G'].forEach(function(k) {
        html += '<td style="padding:6px 10px;text-align:center;">' + (ex[k] != null ? Number(ex[k]).toFixed(1) : '—') + '</td>';
      });
      html += '<td style="padding:6px 10px;">' + (r.gravidade || '—') + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
  }

  // longitudinal
  if (dados.longitudinal) {
    html += '<div class="resultado-card">';
    html += '<h3>Leitura longitudinal</h3>';
    html += '<div class="longitudinal-label">' + (dados.longitudinal.texto || '—') + '</div>';
    html += '</div>';
  }

  el.innerHTML = html;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function nomeEixo(k) {
  var nomes = { S: 'Sentir', O: 'Organizar', A: 'Agir', P: 'Propósito' };
  return nomes[k] || k;
}

function fmtData(iso) {
  if (!iso) return '—';
  var d = new Date(iso.indexOf('Z') === -1 && iso.indexOf('+') === -1 ? iso + 'Z' : iso);
  return d.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' }) + ' ' +
         d.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
}

function fmtDataCurta(iso) {
  if (!iso) return '—';
  var d = new Date(iso.indexOf('Z') === -1 && iso.indexOf('+') === -1 ? iso + 'Z' : iso);
  return d.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
}

// ─── INICIALIZAÇÃO ────────────────────────────────────────────────────────────

(function init() {
  var sessao = obterSessao();
  if (sessao.session_token && sessao.questionado_id) {
    mostrarPainel(sessao);
  } else {
    mostrarValidacao();
  }
})();
</script>
</body>
</html>
